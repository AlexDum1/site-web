<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>DumAlgo — Hover header</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:Inter, Helvetica, Arial, sans-serif; background:#EDE9E1; padding:24px; }
  h1 { font-family:Fraunces, Georgia, serif; font-weight:500; font-size:18px; color:#1F2933; margin-bottom:4px; }
  p.note { font-size:12px; color:#6B7280; margin-bottom:16px; }

  /* faux header de site pour contexte réel */
  header.demo { background:#16584E; border-radius:10px; padding:14px 22px;
    display:flex; align-items:center; justify-content:space-between; }
  nav.demo { display:flex; gap:22px; font-size:13px; color:#C9D9D5; }

  .logo-hover { display:inline-flex; align-items:center; gap:10px; cursor:pointer; text-decoration:none; }
  .logo-hover .word { font-family:Fraunces, Georgia, serif; font-weight:500; font-size:22px; color:#FAF7F2; }
  .logo-hover .word b { font-weight:500; color:#C9A227; }

  /* onde : une impulsion dorée parcourt le trait jusqu'au nœud doré */
  .logo-hover .pulse { fill:none; stroke:#C9A227; stroke-width:3.5; stroke-linecap:round;
    stroke-dasharray:.2 1; stroke-dashoffset:.2; opacity:0; }
  .logo-hover .gold { transform-box:fill-box; transform-origin:center; }
  .logo-hover:hover .pulse { animation:travel .4s cubic-bezier(.4,0,.2,1) forwards; }
  .logo-hover:hover .gold { animation:goldPop .45s ease-out .25s; }
  @keyframes travel {
    0% { stroke-dashoffset:.2; opacity:1; }
    85% { opacity:1; }
    100% { stroke-dashoffset:-1; opacity:0; }
  }
  @keyframes goldPop {
    0% { transform:scale(1); filter:drop-shadow(0 0 0 rgba(201,162,39,0)); }
    40% { transform:scale(1.18); filter:drop-shadow(0 0 5px rgba(201,162,39,.9)); }
    100% { transform:scale(1); filter:drop-shadow(0 0 0 rgba(201,162,39,0)); }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo-hover:hover .pulse, .logo-hover:hover .gold { animation:none; }
  }
</style>
</head>
<body>
<h1>Hover — onde vers le nœud doré</h1>
<p class="note">Au survol du logo dans le header : une impulsion dorée parcourt le trait (~400 ms) et le nœud doré s'illumine brièvement. Survolez le logo ci-dessous.</p>

<header class="demo">
  <a class="logo-hover" href="#" onclick="return false">
    <svg width="40" height="40" viewBox="0 0 64 64">
      <path fill="none" stroke="#FAF7F2" stroke-width="3.5" stroke-linecap="round"
        d="M22 13 V45.5 Q22 50 26.5 50 H35.5 M22 23.5 Q22 28 26.5 28 H31.75"/>
      <path class="pulse" pathLength="1" d="M22 13 V45.5 Q22 50 26.5 50 H35.5"/>
      <rect x="17.5" y="8.5" width="9" height="9" rx="2.8" fill="#FAF7F2"/>
      <rect x="33" y="24" width="8" height="8" rx="2.5" fill="#FAF7F2"/>
      <rect class="gold" x="36.5" y="44.5" width="11" height="11" rx="3.2" fill="#C9A227"/>
    </svg>
    <span class="word">Dum<b>Algo</b></span>
  </a>
  <nav class="demo"><span>Réalisations</span><span>Services</span><span>Contact</span></nav>
</header>
</body>
</html>
