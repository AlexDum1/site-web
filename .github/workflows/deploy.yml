name: Déploiement OVH (dumalgo.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ovh
  cancel-in-progress: false

jobs:
  deploy:
    name: Assembler et envoyer par FTP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Assembler le site dans _deploy/
        run: |
          set -euo pipefail
          mkdir -p _deploy

          # Site principal DumAlgo à la racine du domaine (sans les documents internes de branding)
          rsync -a --exclude 'branding/' --exclude '.DS_Store' DumAlgo/ _deploy/

          # Maquettes de démonstration en sous-dossiers
          for demo in espace-respire laetitia-cardinale menuiserie-durand-le-pouget \
                      passion-metal-aniane renov-facades34-montarnaud sutra-charpente-clermont-lherault; do
            rsync -a --exclude '.DS_Store' "$demo/" "_deploy/$demo/"
          done

          # Fichiers racine web (.htaccess, robots.txt, sitemap.xml)
          rsync -a deploy/root/ _deploy/

          echo "Contenu assemblé :"
          find _deploy -maxdepth 2 | sort

      - name: Installer lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      # Le FTP mutualisé OVH ne supporte pas FTPS (erreur "500 This security
      # scheme is not implemented") ; OVH recommande SFTP sur le port 22.
      - name: Envoyer vers OVH par SFTP
        env:
          SFTP_SERVER: ssh.cluster100.hosting.ovh.net
          SFTP_USERNAME: ${{ secrets.OVH_FTP_USERNAME }}
          LFTP_PASSWORD: ${{ secrets.OVH_FTP_PASSWORD }}
        run: |
          lftp --env-password -u "$SFTP_USERNAME" "sftp://$SFTP_SERVER" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            set net:timeout 30;
            mirror -R --delete --parallel=4 --verbose=1 _deploy/ www/;
            quit"
