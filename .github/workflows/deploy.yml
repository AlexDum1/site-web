name: Déploiement OVH (dumalgo.fr)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ovh
  cancel-in-progress: false

jobs:
  deploy:
    name: Assembler et envoyer par FTP
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Assembler le site dans _deploy/
        run: |
          set -euo pipefail
          mkdir -p _deploy

          # Site principal DumAlgo à la racine du domaine (sans les documents internes de branding)
          rsync -a --exclude 'branding/' --exclude '.DS_Store' DumAlgo/ _deploy/

          # Maquettes de démonstration en sous-dossiers
          for demo in espace-respire laetitia-cardinale menuiserie-durand-le-pouget \
                      passion-metal-aniane renov-facades34-montarnaud sutra-charpente-clermont-lherault; do
            rsync -a --exclude '.DS_Store' "$demo/" "_deploy/$demo/"
          done

          # Fichiers racine web (.htaccess, robots.txt, sitemap.xml)
          rsync -a deploy/root/ _deploy/

          echo "Contenu assemblé :"
          find _deploy -maxdepth 2 | sort

      - name: Envoyer vers OVH par FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          protocol: ftps
          local-dir: _deploy/
          server-dir: www/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
